name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Run daily after US market close (4 PM ET = 21:00 UTC, +30 min buffer)
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Fetch live stock data
        run: npm run fetch-data
        continue-on-error: true

      - name: Commit updated market data
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/market-indices.md content/sp500-quotes.md content/watchlist-data.md
          git diff --cached --quiet || git commit -m "chore: update market data [skip ci]"
          git push

      - run: npx next build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - id: deployment
        uses: actions/deploy-pages@v4
