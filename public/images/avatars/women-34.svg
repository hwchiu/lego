  <path d="M20 36 Q21 33 20 30" fill="none" stroke="#7B3F00" stroke-width="3" stroke-linecap="round"/>
  <path d="M44 36 Q43 33 44 30" fill="none" stroke="#7B3F00" stroke-width="3" stroke-linecap="round"/>
