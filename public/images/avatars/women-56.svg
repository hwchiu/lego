<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="#F43F5E"/>
  <!-- Shirt/body -->
  <rect x="20" y="48" width="24" height="16" rx="4" fill="#9F1239"/>
  <!-- Neck -->
  <rect x="28" y="42" width="8" height="8" fill="#FFD5B0"/>
  <!-- Head -->
  <ellipse cx="32" cy="34" rx="12" ry="13" fill="#FFD5B0"/>
  <!-- Hair - short bob blonde -->
  <ellipse cx="32" cy="22" rx="13" ry="7" fill="#D4A017"/>
  <rect x="19" y="22" width="5" height="14" rx="2" fill="#D4A017"/>
  <rect x="40" y="22" width="5" height="14" rx="2" fill="#D4A017"/>
  <rect x="20" y="22" width="24" height="8" fill="#D4A017"/>
  <!-- Hair ends (bob style) -->
  <path d="M20 34 Q19 37 21 36" fill="#D4A017" stroke="none"/>
  <path d="M44 34 Q45 37 43 36" fill="#D4A017" stroke="none"/>
  <!-- Eyes - bright -->
  <ellipse cx="27" cy="32" rx="2.2" ry="1.6" fill="#1a1a1a"/>
  <ellipse cx="37" cy="32" rx="2.2" ry="1.6" fill="#1a1a1a"/>
  <circle cx="27.8" cy="31.5" r="0.5" fill="white"/>
  <circle cx="37.8" cy="31.5" r="0.5" fill="white"/>
  <!-- Eyelashes -->
  <path d="M24.8 30.5 L24.2 29.5" stroke="#1a1a1a" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M29.2 30.5 L29.8 29.5" stroke="#1a1a1a" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M34.8 30.5 L34.2 29.5" stroke="#1a1a1a" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M39.2 30.5 L39.8 29.5" stroke="#1a1a1a" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Nose -->
  <ellipse cx="32" cy="36" rx="1.3" ry="0.9" fill="#e8a97a"/>
  <!-- Mouth - big smile -->
  <path d="M28 39 Q32 43 36 39" fill="#E05070" stroke="#C03050" stroke-width="0.5"/>
  <!-- Eyebrows - arched -->
  <path d="M24.5 27.5 Q27 26.5 29.5 27.8" fill="none" stroke="#9B7000" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M34.5 27.5 Q37 26.5 39.5 27.8" fill="none" stroke="#9B7000" stroke-width="1.2" stroke-linecap="round"/>
