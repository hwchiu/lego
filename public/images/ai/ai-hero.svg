<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <rect width="900" height="600" fill="#0d1117"/>
  <!-- Network nodes -->
  <g fill="#4fc3f7" opacity="0.8">
    <circle cx="450" cy="300" r="30"/>
    <circle cx="250" cy="200" r="20"/>
    <circle cx="650" cy="200" r="20"/>
    <circle cx="200" cy="400" r="15"/>
    <circle cx="700" cy="400" r="15"/>
    <circle cx="350" cy="450" r="18"/>
    <circle cx="550" cy="450" r="18"/>
  </g>
  <!-- Connections -->
  <g stroke="#4fc3f7" stroke-opacity="0.4" stroke-width="2">
    <line x1="450" y1="300" x2="250" y2="200"/>
    <line x1="450" y1="300" x2="650" y2="200"/>
    <line x1="450" y1="300" x2="200" y2="400"/>
    <line x1="450" y1="300" x2="700" y2="400"/>
    <line x1="450" y1="300" x2="350" y2="450"/>
    <line x1="450" y1="300" x2="550" y2="450"/>
  </g>
  <text x="450" y="570" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#4fc3f7" opacity="0.9">AI Intelligence Search</text>
</svg>